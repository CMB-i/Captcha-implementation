<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Simple CAPTCHA Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 18px; max-width: 760px; }
    .grid { display:grid; gap:10px; margin: 12px 0; }
    .tile {
      width:64px; height:64px; display:flex; align-items:center; justify-content:center;
      font-size: 34px; border:1px solid #ddd; border-radius:12px; cursor:pointer; user-select:none;
      background: #fff;
    }
    .tile.sel { outline: 3px solid #111; }
    button { padding:10px 12px; border-radius:10px; border:1px solid #ddd; cursor:pointer; background:#f7f7f7; }
    button:hover { background:#f1f1f1; }
    .pill { padding:6px 10px; border:1px solid #eee; border-radius:999px; background:#fafafa; display:inline-block; }
    .ok { color:#0a7a2f; font-weight:600; }
    .bad { color:#b00020; font-weight:600; }
  </style>
</head>
<body>
  <h2>Simple CAPTCHA Demo</h2>

  <div class="pill" id="attempts">Attempts left: -</div>

  <div id="prompt" style="margin-top:10px; font-weight:600;"></div>
  <div id="status" style="margin-top:6px;"></div>

  <div id="grid" class="grid"></div>

  <button id="verify" disabled>Verify</button>
  <button id="new">New Challenge</button>

<script>
let challenge=null, sig=null;
let picked=new Set();

function $(id){ return document.getElementById(id); }

function render(side, choices){
  const g=$("grid");
  g.innerHTML="";
  g.style.gridTemplateColumns = `repeat(${side}, 64px)`;
  picked.clear();

  choices.forEach((e,i)=>{
    const d=document.createElement("div");
    d.className="tile";
    d.textContent=e;
    d.onclick=()=>{
      if(picked.has(i)){ picked.delete(i); d.classList.remove("sel"); }
      else { picked.add(i); d.classList.add("sel"); }
    };
    g.appendChild(d);
  });
}

async function newCaptcha(){
  $("status").innerHTML = "";
  $("prompt").textContent = "";
  $("verify").disabled = true;
  $("grid").innerHTML = "";
  $("attempts").textContent = "Attempts left: -";

  const res = await fetch("/captcha/new");
  const data = await res.json();

  if(!data.ok){
    $("status").innerHTML = `<span class="bad"> ${data.reason || "Error"}</span>`;
    return;
  }

  challenge = data.challenge;
  sig = data.sig;

  $("prompt").textContent = data.prompt;
  $("attempts").textContent = `Attempts left: ${data.attempts_left ?? "-"}`;

  render(data.side, data.choices);
  $("verify").disabled = false;
}

$("verify").onclick = async ()=>{
  const res = await fetch("/captcha/verify", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ challenge, sig, picked: Array.from(picked) })
  });
  const data = await res.json();

  if(data.ok){
    $("status").innerHTML = `<span class="ok"> Human verified!</span>`;
    $("verify").disabled = true;
  } else {
    const msg = data.message || data.reason || "Wrong";
    $("status").innerHTML = `<span class="bad">❌ ${msg}</span>`;
  }

  if (data.attempts_left !== undefined) {
    $("attempts").textContent = `Attempts left: ${data.attempts_left}`;
  }
};

$("new").onclick = newCaptcha;

// Auto-load captcha on page open
newCaptcha();
</script>
</body>
</html>
